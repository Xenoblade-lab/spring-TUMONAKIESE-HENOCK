<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(#{nav.home})}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container pb-5">
    <div th:replace="~{fragments/alerts :: alerts}"></div>

    <section class="hero-section text-center mb-5">
        <div class="hero-badge mb-3">
            <i class="bi bi-geo-alt-fill me-1"></i> Lubumbashi, RDC
        </div>
        <h1 class="hero-title" th:text="#{home.welcome}">Livrevenue</h1>
        <p class="hero-subtitle" th:text="#{home.subtitle}">Sous-titre</p>
        <a class="btn btn-primary btn-lg hero-cta mt-2" th:href="@{/livres}">
            <i class="bi bi-book me-2"></i><span th:text="#{home.hero.cta}">Parcourir</span>
        </a>
    </section>

    <div class="row g-4">
        <div class="col-12 col-sm-6 col-lg-3">
            <a class="dashboard-card card h-100 text-decoration-none" th:href="@{/genres}">
                <div class="card-body">
                    <div class="dashboard-icon genres-icon">
                        <i class="bi bi-tags"></i>
                    </div>
                    <h2 class="dashboard-title" th:text="#{nav.genres}">Catégories</h2>
                    <p class="dashboard-desc" th:text="#{card.genres.desc}">Types de livres</p>
                </div>
            </a>
        </div>
        <div class="col-12 col-sm-6 col-lg-3">
            <a class="dashboard-card card h-100 text-decoration-none" th:href="@{/adherents}">
                <div class="card-body">
                    <div class="dashboard-icon adherents-icon">
                        <i class="bi bi-people"></i>
                    </div>
                    <h2 class="dashboard-title" th:text="#{nav.adherents}">Adherents</h2>
                    <p class="dashboard-desc" th:text="#{card.adherents.desc}">Acheteurs</p>
                </div>
            </a>
        </div>
        <div class="col-12 col-sm-6 col-lg-3">
            <a class="dashboard-card card h-100 text-decoration-none" th:href="@{/livres}">
                <div class="card-body">
                    <div class="dashboard-icon livres-icon">
                        <i class="bi bi-book"></i>
                    </div>
                    <h2 class="dashboard-title" th:text="#{nav.livres}">Livres</h2>
                    <p class="dashboard-desc" th:text="#{card.livres.desc}">Propriétés</p>
                </div>
            </a>
        </div>
        <div class="col-12 col-sm-6 col-lg-3">
            <a class="dashboard-card card h-100 text-decoration-none" th:href="@{/emprunts}">
                <div class="card-body">
                    <div class="dashboard-icon emprunts-icon">
                        <i class="bi bi-calendar-check"></i>
                    </div>
                    <h2 class="dashboard-title" th:text="#{nav.emprunts}">Emprunts</h2>
                    <p class="dashboard-desc" th:text="#{card.emprunts.desc}">Planification</p>
                </div>
            </a>
        </div>
    </div>
</main>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
