<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(#{nav.adherents})}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container pb-5">
    <h1 class="page-header" th:text="${id} != null ? #{action.edit} : #{action.new}">Formulaire</h1>
    <form th:action="@{/adherents/save}" th:object="${form}" method="post" class="card card-body">
        <input type="hidden" name="id" th:value="${id}"/>
        <div class="mb-3">
            <label class="form-label" th:text="#{label.genre}">Catégorie</label>
            <select class="form-select" th:field="*{genrePk}">
                <option th:each="c : ${genres}" th:value="${c.id}" th:text="${c.libelle}"></option>
            </select>
            <div class="form-error" th:if="${#fields.hasErrors('genrePk')}" th:errors="*{genrePk}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label" th:text="#{label.noms}">Noms</label>
            <input class="form-control" th:field="*{noms}" maxlength="100"/>
            <div class="form-error" th:if="${#fields.hasErrors('noms')}" th:errors="*{noms}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label" th:text="#{label.quartier}">Ville</label>
            <input class="form-control" th:field="*{quartier}" maxlength="45"/>
            <div class="form-error" th:if="${#fields.hasErrors('quartier')}" th:errors="*{quartier}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label" th:text="#{label.telephone}">Téléphone</label>
            <input class="form-control" th:field="*{telephone}" maxlength="20"/>
            <div class="form-error" th:if="${#fields.hasErrors('telephone')}" th:errors="*{telephone}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label" th:text="#{label.quotaMax}">Budget</label>
            <input class="form-control" type="number" th:field="*{quotaMax}" min="1"/>
            <div class="form-error" th:if="${#fields.hasErrors('quotaMax')}" th:errors="*{quotaMax}"></div>
        </div>
        <div class="d-grid gap-2 d-sm-flex">
            <button class="btn btn-primary" type="submit" th:text="#{action.save}">Enregistrer</button>
            <a class="btn btn-secondary" th:href="@{/adherents}" th:text="#{action.cancel}">Annuler</a>
        </div>
    </form>
</main>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
