<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(#{nav.articles})}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container pb-5">
    <h1 class="page-header" th:text="${id} != null ? #{action.edit} : #{action.new}">Formulaire</h1>
    <form th:action="@{/articles/save}" th:object="${form}" method="post" class="card card-body">
        <input type="hidden" name="id" th:value="${id}"/>
        <div class="mb-3">
            <label class="form-label" th:text="#{label.titre}">Titre</label>
            <input class="form-control" th:field="*{titre}" maxlength="100"/>
            <div class="form-error" th:if="${#fields.hasErrors('titre')}" th:errors="*{titre}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label" th:text="#{label.vues}">Surface</label>
            <input class="form-control" type="number" th:field="*{vues}" min="1"/>
            <div class="form-error" th:if="${#fields.hasErrors('vues')}" th:errors="*{vues}"></div>
        </div>
        <div class="d-grid gap-2 d-sm-flex">
            <button class="btn btn-primary" type="submit" th:text="#{action.save}">Enregistrer</button>
            <a class="btn btn-secondary" th:href="@{/articles}" th:text="#{action.cancel}">Annuler</a>
        </div>
    </form>
</main>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
