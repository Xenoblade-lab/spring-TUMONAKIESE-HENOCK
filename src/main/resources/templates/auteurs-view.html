<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(#{nav.auteurs})}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container pb-5">
    <div th:replace="~{fragments/alerts :: alerts}"></div>
    <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-2 page-header">
        <h1 th:text="#{nav.auteurs}">Auteurs</h1>
        <a class="btn btn-primary" th:href="@{/auteurs/create}" th:text="#{action.new}">Nouveau</a>
    </div>
    <form class="row g-2 mb-3" method="get" th:action="@{/auteurs}">
        <div class="col-12 col-md-8">
            <input class="form-control" type="search" name="keyword" th:value="${keyword}" th:placeholder="#{keyword}"/>
        </div>
        <div class="col-12 col-md-4 d-grid">
            <button class="btn btn-outline-primary" type="submit" th:text="#{action.search}">Rechercher</button>
        </div>
    </form>
    <div class="table-responsive">
        <table class="table table-striped table-bordered mb-0">
            <thead>
            <tr>
                <th th:text="#{label.id}">Id</th>
                <th th:text="#{label.noms}">Noms</th>
                <th th:text="#{label.categorie}">Catégorie</th>
                <th th:text="#{label.ville}">Ville</th>
                <th th:text="#{label.experience}">Budget</th>
                <th th:text="#{label.actions}">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="row : ${rows}">
                <td th:text="${row.id}">1</td>
                <td th:text="${row.noms}">Noms</td>
                <td th:text="${row.categorie != null ? row.categorie.libelle : ''}">Catégorie</td>
                <td th:text="${row.ville}">Ville</td>
                <td th:text="${row.experience}">3</td>
                <td th:replace="~{fragments/table-actions :: cell(@{/auteurs/{id}/edit(id=${row.id})}, @{/auteurs/{id}/delete(id=${row.id})})}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(rows)}">
                <td colspan="6" th:text="#{empty}">Aucune donnée</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
