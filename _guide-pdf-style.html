<style>
  @page { margin: 1.6cm 1.8cm; size: A4; }
  html { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  body {
    font-family: "Segoe UI", Calibri, Arial, sans-serif;
    font-size: 10.5pt; line-height: 1.48; color: #1a1a2e;
    max-width: 920px; margin: 0 auto; padding: 0 8px 16px; background: #fff;
  }
  h1 {
    font-size: 1.45rem; font-weight: 700; color: #4a1942;
    border-bottom: 3px solid #2ec4b6; padding-bottom: 0.35em; margin: 0 0 0.9em;
  }
  h1 + p { color: #37474f; margin-bottom: 1em; border: none; background: none; padding: 0; }
  h2 {
    font-size: 1.1rem; font-weight: 700; color: #4a1942; margin-top: 1.25em;
    border-left: 4px solid #2ec4b6; padding: 0.35em 0 0.35em 0.55em;
    background: linear-gradient(to right, #f3ede4, #fff);
    page-break-after: avoid;
  }
  h3 { font-size: 1rem; font-weight: 600; color: #37474f; margin-top: 0.95em; page-break-after: avoid; }
  p, li { color: #1a1a2e; }
  strong { color: #4a1942; font-weight: 600; }
  a { color: #148f85; text-decoration: underline; }
  hr { border: none; border-top: 1px solid #cfd8dc; margin: 1.1em 0; }
  table { width: 100%; border-collapse: collapse; margin: 0.55em 0 1em; font-size: 8.5pt; page-break-inside: avoid; }
  thead th, tr:first-child th {
    background: #f3ede4; color: #4a1942; font-weight: 700;
    border: 1px solid #90a4ae; padding: 0.4em 0.55em;
  }
  th, td { border: 1px solid #cfd8dc; padding: 0.35em 0.5em; color: #1a1a2e; background: #fff; }
  tbody tr:nth-child(even) td { background: #fefcf8; }
  code {
    font-family: Consolas, monospace; font-size: 9pt;
    background: #f5f5f5; color: #263238; padding: 0.1em 0.35em;
    border: 1px solid #e0e0e0; border-radius: 3px;
  }
  pre {
    font-family: Consolas, monospace; font-size: 8.8pt; line-height: 1.42;
    background: #fefcf8; color: #263238; border: 1px solid #cfd8dc;
    border-left: 4px solid #2ec4b6; padding: 0.65em 0.85em; margin: 0.55em 0 0.85em;
    page-break-inside: avoid;
  }
  pre code { background: transparent; border: none; padding: 0; color: inherit; }
  blockquote { border-left: 4px solid #2ec4b6; background: #fefcf8; color: #37474f; padding: 0.55em 0.85em; }
  ul, ol { margin: 0.35em 0 0.65em; }
  li { margin: 0.15em 0; }
</style>
